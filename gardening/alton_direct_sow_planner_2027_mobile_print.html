<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Alton Direct Sow Planner — 2027 Growing Season</title>
<style>
:root {
  --bg: #f5f3ed;
  --card: #ffffff;
  --ink: #1f2a24;
  --muted: #66736b;
  --green: #1f4e46;
  --line: #d7ddd5;
  --tag: #e7efe8;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--ink);
}
header {
  background: var(--green);
  color: white;
  padding: 1rem;
}
header h1 { margin: 0 0 .25rem; font-size: clamp(1.35rem, 5vw, 2rem); }
header p { margin: 0; opacity: .9; font-size: .95rem; }
.toolbar {
  position: sticky;
  top: 0;
  z-index: 10;
  background: rgba(245,243,237,.96);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--line);
  padding: .75rem;
  display: grid;
  gap: .5rem;
}
.controls {
  display: grid;
  grid-template-columns: 1fr;
  gap: .5rem;
}
input, select, button {
  font: inherit;
  padding: .7rem .75rem;
  border: 1px solid var(--line);
  border-radius: .65rem;
  background: white;
}
button {
  background: var(--green);
  color: white;
  border: 0;
  font-weight: 700;
}
button.secondary {
  background: #42524a;
}
main {
  padding: .75rem;
  max-width: 1200px;
  margin: 0 auto;
}
.summary {
  display: flex;
  flex-wrap: wrap;
  gap: .5rem;
  margin-bottom: .75rem;
  color: var(--muted);
  font-size: .9rem;
}
.card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 1rem;
  padding: .9rem;
  margin-bottom: .75rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.04);
}
.card-top {
  display: flex;
  align-items: start;
  justify-content: space-between;
  gap: .75rem;
}
.card h2 {
  margin: 0;
  font-size: 1.15rem;
}
.meta {
  margin-top: .25rem;
  display: flex;
  flex-wrap: wrap;
  gap: .35rem;
}
.tag {
  background: var(--tag);
  color: #244a38;
  padding: .2rem .45rem;
  border-radius: 999px;
  font-size: .78rem;
}
.print-check {
  transform: scale(1.25);
  margin-top: .25rem;
}
.grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: .45rem;
  margin-top: .75rem;
}
.field {
  border-top: 1px solid var(--line);
  padding-top: .45rem;
}
.label {
  color: var(--muted);
  font-size: .78rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .03em;
}
.value {
  margin-top: .12rem;
  line-height: 1.35;
}
.details {
  margin-top: .65rem;
}
.details summary {
  cursor: pointer;
  font-weight: 700;
  color: var(--green);
}
@media (min-width: 760px) {
  .controls { grid-template-columns: 2fr 1fr 1fr auto auto; }
  .grid { grid-template-columns: repeat(3, 1fr); }
}
.print-sheet { display: none; }
@media print {
  @page { size: landscape; margin: .28in; }
  * { box-shadow: none !important; text-shadow: none !important; }
  body { background: white; color: black; font-family: Arial, Helvetica, sans-serif; font-size: 7.5pt; }
  header, .toolbar, .no-print, .card { display: none !important; }
  main { padding: 0; max-width: none; }
  .print-sheet { display: block; }
  .print-title { margin: 0 0 .06in; font-size: 11pt; line-height: 1.1; }
  .print-subtitle { margin: 0 0 .08in; font-size: 7pt; color: #333; }
  .print-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  .print-table th,
  .print-table td { border: .5pt solid #777; padding: 2px 3px; vertical-align: top; line-height: 1.12; }
  .print-table th { background: #e9e9e9; font-size: 6.8pt; font-weight: 700; text-align: left; white-space: nowrap; }
  .print-table td { font-size: 6.7pt; }
  .print-table tbody tr { break-inside: avoid; }
  .print-table tbody tr:nth-child(even) td { background: #f7f7f7; }
  .print-table .plant { width: 10%; font-weight: 700; }
  .print-table .category { width: 8%; }
  .print-table .window { width: 11%; }
  .print-table .date { width: 7%; white-space: nowrap; }
  .print-table .depth { width: 8%; }
  .print-table .spacing { width: 9%; }
  .print-table .soil-temp { width: 8%; }
  .print-table .germ { width: 8%; }
  .print-table .notes { width: 31%; }
}
</style>
</head>
<body>
<header>
  <h1>Alton Direct Sow Planner — 2027 Growing Season</h1>
  <p>Direct-sow reference for vegetables, herbs, wildflowers, milkweeds, native grasses, and cover crops. Dates stored as text. Built for mobile and print.</p>
</header>

<section class="toolbar no-print">
  <div class="controls">
    <input id="search" placeholder="Search plants, notes, problems, companions…">
    <select id="category"><option value="">All categories</option></select>
    <select id="native"><option value="">All native statuses</option><option value="native">Native only</option><option value="non-invasive">Non-invasive</option></select>
    <button onclick="window.print()">Print selected</button>
    <button class="secondary" id="selectAllBtn">Select all shown</button>
  </div>
  <div class="summary"><span id="count"></span><span>Tip: select specific cards before printing, or print all shown.</span></div>
</section>

<main>
  <section id="printSheet" class="print-sheet" aria-hidden="true"></section>
  <div id="cards"></div>
</main>

const categoryEl = document.getElementById('category');
const cardsEl = document.getElementById('cards');
const printSheetEl = document.getElementById('printSheet');
const searchEl = document.getElementById('search');
const nativeEl = document.getElementById('native');
const countEl = document.getElementById('count');
let printSelection = new Set();

[...new Set(DATA.map(x => x.Category))].sort().forEach(cat => {
  const opt = document.createElement('option');
  opt.value = cat; opt.textContent = cat;
  categoryEl.appendChild(opt);
});

const keyFields = ["Earliest Date","Latest Date","Direct Sow Window","Seed Depth","Plant Spacing","Germination","Soil Temp","Sun","Moisture","Cold Stratification","Seed Treatment","Direct Sow Notes"];
const detailFields = ["Row/Drift Spacing","Days to Maturity","Succession","Pollinator Value","Soil","Companions","Avoid Nearby","Wildlife Value","Self-seeding","Seed Saving","Common Problems","Harvest Window","Baker Creek","Rule Basis"];

function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function render() {
  const q = searchEl.value.toLowerCase().trim();
  const cat = categoryEl.value;
  const nat = nativeEl.value;

  const shown = DATA.filter(r => {
    const hay = Object.values(r).join(' ').toLowerCase();
    if (q && !hay.includes(q)) return false;
    if (cat && r.Category !== cat) return false;
    const ns = String(r["Native / Non-invasive"]).toLowerCase();
    if (nat === "native" && !ns.includes("native")) return false;
    if (nat === "non-invasive" && !ns.includes("non-invasive")) return false;
    return true;
  });

  countEl.textContent = `${shown.length} shown / ${DATA.length} total`;
  cardsEl.innerHTML = shown.map((r, idx) => {
    const id = r.Plant;
    const checked = printSelection.has(id) ? "checked" : "";
    const selectedClass = printSelection.has(id) ? "selected-print" : "";
    return `<article class="card ${selectedClass}" data-plant="${esc(id)}">
      <div class="card-top">
        <div>
          <h2>${esc(r.Plant)}</h2>
          <div class="meta">
            <span class="tag">${esc(r.Category)}</span>
            <span class="tag">${esc(r["Native / Non-invasive"])}</span>
            <span class="tag">${esc(r["Direct Sow Window"])}</span>
          </div>
        </div>
        <input class="print-check no-print" type="checkbox" aria-label="Print ${esc(r.Plant)}" ${checked} onchange="togglePrint('${esc(id)}', this.checked)">
      </div>
      <div class="grid">
        ${keyFields.map(f => `<div class="field"><div class="label">${esc(f)}</div><div class="value">${esc(r[f])}</div></div>`).join('')}
      </div>
      <details class="details">
        <summary>More reference details</summary>
        <div class="grid">
          ${detailFields.map(f => `<div class="field"><div class="label">${esc(f)}</div><div class="value">${esc(r[f])}</div></div>`).join('')}
        </div>
      </details>
    </article>`;
  }).join('');

  const rows = printSelection.size ? shown.filter(r => printSelection.has(r.Plant)) : shown;
  renderPrintSheet(rows, shown.length);

  // If nothing selected, print all currently shown
  if (printSelection.size === 0) {
    document.querySelectorAll('.card').forEach(c => c.classList.add('print-all'));
  }
}

function renderPrintSheet(rows, shownCount) {
  const printed = rows.length;
  const scope = printSelection.size ? `${printed} selected / ${shownCount} shown` : `${shownCount} shown`;
  printSheetEl.innerHTML = `
    <h1 class="print-title">Alton Direct Sow Planner — 2027 Growing Season</h1>
    <p class="print-subtitle">Compact print sheet: ${esc(scope)}. Filter/search selections are respected.</p>
    <table class="print-table">
      <thead>
        <tr>
          <th class="plant">Plant</th>
          <th class="category">Cat.</th>
          <th class="window">Window</th>
          <th class="date">Earliest</th>
          <th class="date">Latest</th>
          <th class="depth">Depth</th>
          <th class="spacing">Spacing</th>
          <th class="soil-temp">Soil Temp</th>
          <th class="germ">Germ.</th>
          <th class="notes">Basic Notes</th>
        </tr>
      </thead>
      <tbody>
        ${rows.map(r => `<tr>
          <td class="plant">${esc(r.Plant)}</td>
          <td class="category">${esc(r.Category)}</td>
          <td class="window">${esc(r["Direct Sow Window"])}</td>
          <td class="date">${esc(r["Earliest Date"])}</td>
          <td class="date">${esc(r["Latest Date"])}</td>
          <td class="depth">${esc(r["Seed Depth"])}</td>
          <td class="spacing">${esc(r["Plant Spacing"])}</td>
          <td class="soil-temp">${esc(r["Soil Temp"])}</td>
          <td class="germ">${esc(r.Germination)}</td>
          <td class="notes">${esc(r["Direct Sow Notes"])}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

function togglePrint(id, checked) {
  if (checked) printSelection.add(id); else printSelection.delete(id);
  render();
}

document.getElementById('selectAllBtn').addEventListener('click', () => {
  const q = searchEl.value.toLowerCase().trim();
  const cat = categoryEl.value;
  const nat = nativeEl.value;
  DATA.forEach(r => {
    const hay = Object.values(r).join(' ').toLowerCase();
    const ns = String(r["Native / Non-invasive"]).toLowerCase();
    if ((!q || hay.includes(q)) && (!cat || r.Category === cat) && (!nat || (nat === "native" ? ns.includes("native") : ns.includes("non-invasive")))) {
      printSelection.add(r.Plant);
    }
  });
  render();
});

[searchEl, categoryEl, nativeEl].forEach(el => el.addEventListener('input', render));
render();
</script>
</body>
</html>
